<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Study Timer | UCSC Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div style="display:flex; align-items:center; gap:10px;"><div style="width:30px; height:30px; background:var(--gold); border-radius:50%;"></div><span style="font-weight:800;">UCSC Hub</span></div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="gpa.html">GPA Calc</a>
            <a href="timer.html">Timer</a>
            <a href="ideas.html">Ideas</a>
            <label class="switch"><input type="checkbox" id="theme-toggle"><span class="slider"></span></label>
        </div>
    </nav>

    <div class="app-grid">
        <aside class="sidebar">
            <h3>Upcoming Events</h3>
            <div id="event-list"><div class="event-item">Focus Session #1</div></div>
        </aside>

        <main>
            <div class="glass-card" style="text-align:center;">
                <h2>⏱️ Focus Timer</h2>
                <div style="margin: 20px 0;">
                    <input type="number" id="custom-min" class="input-modern" style="width:80px;" placeholder="Min">
                    <button class="btn-outline" onclick="setTimer()">Set</button>
                </div>
                <h1 id="timer-display" style="font-size:6rem; color:var(--maroon); margin:20px 0;">25:00</h1>
                <div style="display:flex; justify-content:center; gap:15px;">
                    <button id="start-btn" class="btn-primary" onclick="toggleTimer()">Start</button>
                    <button class="btn-outline" onclick="resetTimer()">Reset</button>
                </div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
