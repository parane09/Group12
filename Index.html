<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCSC Hub | Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div style="display:flex; align-items:center; gap:10px;">
            <img src="download.png" alt="UCSC Logo" style="width:30px; height:30px; border-radius:50%; object-fit: cover;">
            <span style="font-weight:800; font-size:1.2rem;">UCSC Hub</span>
        </div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="gpa.html">GPA Calc</a>
            <a href="timer.html">Timer</a>
            <label class="switch"><input type="checkbox" id="theme-toggle"><span class="slider"></span></label>
        </div>
    </nav>

    <div class="app-grid">
        <aside class="sidebar">
            <h3>Upcoming Events</h3>
            <div id="event-list">
                <div class="event-item">Programming Assignment 01</div>
            </div>
            <input type="text" id="ev-input" class="input-modern" placeholder="Add event...">
            <button class="btn-primary" onclick="addEvent()" style="width:100%">+ Add</button>
        </aside>

        <main>
            <div class="glass-card fade-in">
                <h2>💡 Project Idea Board</h2>
                <p style="margin-bottom:15px;">Capture your innovation here.</p>
                <div style="display:flex; flex-direction:column; gap:10px;">
                    <input type="text" id="name-input" class="input-modern" placeholder="Your Name">
                    <input type="text" id="idea-input" class="input-modern" placeholder="Type an idea...">
                    <button class="btn-primary" onclick="addIdea()">Post Idea</button>
                </div>
                <ul id="idea-list" style="margin-top:20px; list-style: none;">
                    <li class="event-item">AI Study Assistant <br><small style="opacity:0.7;">By: System</small></li>
                </ul>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
