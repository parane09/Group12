<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCSC Hub | Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div style="display:flex; align-items:center; gap:10px;">
            <img src="download.png" alt="UCSC Logo" style="width:35px; height:35px; border-radius:50%; object-fit: contain; background: white;">
            <span style="font-weight:800; font-size:1.2rem;">UCSC Hub</span>
        </div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="gpa.html">GPA Calc</a>
            <a href="timer.html">Timer</a>
            <a href="ideas.html">Ideas</a> <label class="switch"><input type="checkbox" id="theme-toggle"><span class="slider"></span></label>
        </div>
    </nav>

    <div class="app-grid">
        <aside class="sidebar">
            <h3>Upcoming Events</h3>
            <div id="event-list">
                <div class="event-item">Programming Assignment 01</div>
            </div>
            <input type="text" id="ev-input" class="input-modern" placeholder="Add event...">
            <button class="btn-primary" onclick="addEvent()" style="width:100%">+ Add</button>
        </aside>

        <main>
            <div class="glass-card fade-in">
                <h2>🚀 Quick Access</h2>
                <p style="margin-bottom:25px; opacity:0.8;">Select a tool to get started with your studies.</p>
                
                <div class="quick-paths">
                    <a href="gpa.html" class="path-card">
                        <span class="path-icon">📊</span>
                        <span class="path-label">GPA Calculator</span>
                    </a>
                    <a href="timer.html" class="path-card">
                        <span class="path-icon">⏱️</span>
                        <span class="path-label">Focus Timer</span>
                    </a>
                    <a href="ideas.html" class="path-card"> <span class="path-icon">💡</span>
                        <span class="path-label">Project Ideas</span>
                    </a>
                </div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
